# Configuration file for Intel Core i9-14900K (Raptor Lake Refresh)
# Based on your Xeon X5550 (Gainestown) config and adapted to a modern desktop CPU

#include baseline

[perf_model/core]
logical_cpus = 2                      # SMT threads per core (approximation; P-cores have HT, E-cores don't)
core_model = nehalen                  # raptor_lake | modern core model (raptor/raptor_lake family)
frequency = 3.2                       # P-core base frequency in GHz (3.2 GHz P-core base). Use specific SKU freq if desired.

[perf_model/core/interval_timer]
dispatch_width = 6
window_size = 200
num_outstanding_loadstores = 24       # desktops have richer OOO resources than old Nehalem

[perf_model/branch_predictor]
type = pentium_m                      # tournament_m
mispredict_penalty = 12

[perf_model/tlb]
penalty = 40

[perf_model/itlb]
size = 256
associativity = 4

[perf_model/dtlb]
size = 128
associativity = 4

[perf_model/stlb]
size = 1024
associativity = 8

[perf_model/l1_icache]
cache_size = 48
associativity = 12
data_access_time = 3
tags_access_time = 1

[perf_model/l1_dcache]
cache_size = 32
associativity = 8
data_access_time = 3
tags_access_time = 1

[perf_model/l2_cache]
cache_size = 2048                      # modelando ~2 MB L2 por P-core (representação prática)
associativity = 16
data_access_time = 8
tags_access_time = 2
writeback_time = 30

[perf_model/l3_cache]
cache_size = 36864                      # 36 MB L3 (Intel Smart Cache)
associativity = 12
data_access_time = 18
tags_access_time = 6
perf_model_type = parallel
shared_cores = 24                       # total cores modelados (8P + 16E = 24)

[power]
vdd = 1.1
technology_node = 10

# Dual-channel DDR5 / DDR4 support — i9-14900K supports either depending on motherboard
# We'll model a DDR5-5600 (dual-channel) typical desktop configuration
[perf_model/dram]
num_controllers = -1
controllers_interleaving = 2                # dual-channel (2 memory channels)
# DRAM access latency in nanoseconds (modeling). Convert DIMM CL->ns for higher accuracy.
latency = 30
# per-channel theoretical bandwidth: 5600 MT/s × 8 bytes = 44.8 GB/s
per_controller_bandwidth = 44.8
chips_per_dimm = 16                         # typical server-like DIMM chip count as safe approximation
dimms_per_controller = 1                    # desktop motherboards commonly 1 DIMM per channel in typical configs
burst_length = 16                           # if modeling DDR5; if using DDR4 use 8

[network/bus]
bandwidth = 89.6                            # GB/s aggregate (44.8 × 2 channels)
