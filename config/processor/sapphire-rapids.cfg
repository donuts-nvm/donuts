# Configuration file for Intel Xeon Gold 6430 (Sapphire Rapids)
# Based on the Golden Cove core architecture.

#include intel_arch

[general]
total_cores = 32

[perf_model/core]
logical_cpus = 1                    # SMT (Hyper-Threading) disabled for predictable performance
frequency = 2.1

[perf_model/core/interval_timer]
dispatch_width = 6
window_size = 512                   # Re-order Buffer (ROB) size for Golden Cove
num_outstanding_loadstores = 40     # Load/Store Buffers

[perf_model/branch_predictor]
mispredict_penalty = 12

[perf_model/tlb]
penalty = 40

[perf_model/itlb]
size = 256
associativity = 8

[perf_model/dtlb]
size = 96
associativity = 12

[perf_model/stlb]
size = 2048
associativity = 16

[perf_model/l1_icache]
cache_size = 32               # 32 KB
associativity = 8
data_access_time = 4
tags_access_time = 1

[perf_model/l1_dcache]
cache_size = 48               # 48 KB
associativity = 12
data_access_time = 4
tags_access_time = 1

[perf_model/l2_cache]
cache_size = 2048             # 2 MB per core
associativity = 16
data_access_time = 13
tags_access_time = 4
writeback_time = 65

[perf_model/l3_cache]
cache_size = 61440            # 60 MB
associativity = 15            # 15-way (sliced)
data_access_time = 38
tags_access_time = 14
shared_cores = 32

[power]
technology_node = 10          # "Intel 7" process node (10nn)

[perf_model/dram_directory]
total_entries = 983040        # Sized for the L3 cache

[perf_model/dram]
controllers_interleaving = 64
latency = 85                  # ~85ns for DDR5
per_controller_bandwidth = 307# Peak theoretical: DDR5-4800 x 8 channels = 307.2 GB/s
chips_per_dimm = 8
dimms_per_controller = 8      # 1 DPC on 8 channels
burst_length = 16             # DDR5 has a burst length of 16

[network/bus]
bandwidth = 32                # UPI 2.0: 16 GT/s -> 32 GB/s per direction
