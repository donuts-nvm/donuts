# Configuration file for Intel Xeon Granite Rapids (Xeon 6 - representative SP SKU)
# Based on your Xeon X5550 (Gainestown) config and adapted to Granite Rapids characteristics.
# Notes: this is a template for a typical Granite Rapids-SP socket (8 DDR5 channels).
# Adjust frequency, core counts, L3 size and memory channels for the exact SKU you simulate.

[general]
enable_icache_modeling = true

[perf_model/core]
logical_cpus = 1                       # SMT threads per core (set 2 if modelling SMT)
type = interval
core_model = redwood_cove              # Granite Rapids P-cores (Redwood Cove family)
frequency = 2.60                       # base frequency (GHz) - ajuste conforme SKU

[perf_model/core/interval_timer]
dispatch_width = 6                     # modern wide cores can issue more microops
window_size = 200
num_outstanding_loadstores = 32        # higher OOO resources on modern cores

[perf_model/sync]
reschedule_cost = 1000

[caching_protocol]
type = parametric_dram_directory_msi

[perf_model/branch_predictor]
type = tournament_m
mispredict_penalty = 12

[perf_model/tlb]
penalty = 40

[perf_model/itlb]
size = 256
associativity = 4

[perf_model/dtlb]
size = 128
associativity = 4

[perf_model/stlb]
size = 2048
associativity = 8

[perf_model/cache]
levels = 3

[perf_model/l1_icache]
perfect = false
cache_size = 64                        # larger L1I in modern cores (KB)
associativity = 8
address_hash = mask
replacement_policy = lru
data_access_time = 3
tags_access_time = 1
perf_model_type = parallel
writethrough = 0
shared_cores = 1

[perf_model/l1_dcache]
perfect = false
cache_size = 64                        # larger L1D (KB)
associativity = 8
address_hash = mask
replacement_policy = lru
data_access_time = 3
tags_access_time = 1
perf_model_type = parallel
writethrough = 0
shared_cores = 1

[perf_model/l2_cache]
perfect = false
cache_size = 1024                       # 1 MB L2 per core (typical modern large L2)
associativity = 16
address_hash = mask
replacement_policy = lru
data_access_time = 10
tags_access_time = 2
writeback_time = 30
perf_model_type = parallel
writethrough = 0
shared_cores = 1

[perf_model/l3_cache]
cache_block_size = 64
address_hash = mask
dvfs_domain = global
prefetcher = none
writeback_time = 0
perfect = false
cache_size = 368640                     # example: 360 MB total L3 (adjust to SKU)
associativity = 20
replacement_policy = lru
data_access_time = 22
tags_access_time = 8
perf_model_type = parallel
writethrough = 0
shared_cores = 64                       # example for a high-core SKU; ajuste conforme SKU

[clock_skew_minimization]
scheme = barrier

[clock_skew_minimization/barrier]
quantum = 100

[dvfs]
transition_latency = 2000

[dvfs/simple]
cores_per_socket = 1

[power]
vdd = 1.05                              # representative modern core Vdd (ajuste conforme dataset)
technology_node = 10                    # Intel node class; ajuste conforme necessidade

[perf_model/dram_directory]
total_entries = 2097152
associativity = 16
directory_type = full_map

# DDR5-6400 (representative per-channel for Granite Rapids-SP: 8 channels)
[perf_model/dram]
# -1 models distributed DRAM controllers; Granite Rapids-SP typical SKU exposes 8 channels
num_controllers = -1
controllers_interleaving = 8
# DRAM access latency in ns (modeling). Convert DIMM CL cycles -> ns for accuracy; 20-30ns is a reasonable modelling range.
latency = 22
# per-channel theoretical bandwidth: 6400 MT/s × 8 bytes = 51.2 GB/s
per_controller_bandwidth = 51.2
# chips_per_dimm depends on DIMM type and rank (RDIMM/LRDIMM/x4/x8). 16 is a reasonable server-RDIMM estimate.
chips_per_dimm = 16
# Typical server configs: 1DPC best-case speed; 2DPC reduces supported frequency. Use 1..2 per controller in servers.
dimms_per_controller = 1
burst_size = 16                          # DDR5 uses BL16 (internal two 32-bit subchannels)

[network]
memory_model_1 = bus
memory_model_2 = bus

[network/bus]
bandwidth = 409.6                        # GB/s aggregate (51.2 × 8 channels); set high to avoid bottleneck
ignore_local_traffic = true