# Configuration file for Intel Xeon Sapphire Rapids (4th Gen Xeon Scalable) - Xeon Gold 6430
# Adapted from your Xeon X5550 (Gainestown) config to represent a typical Sapphire Rapids socket
# Notes: adjust frequency, core counts and L3 size to match specific SKU when needed.

#include baseline

[perf_model/core]
logical_cpus = 1                       # number of SMT threads per core (set 2 if modelling HT)
core_model = nehalem                   # skylake
frequency = 2.0                        # base frequency (GHz) - ajuste conforme SKU (ex.: 2.1..3.0)

[perf_model/core/interval_timer]
num_outstanding_loadstores = 16        # cores modernos normalmente toleram mais OOO load/stores

[perf_model/branch_predictor]
type = pentium_m                        # tournament_m
mispredict_penalty = 12                 # front-end portion approximate for modern core

[perf_model/tlb]
penalty = 40                            # page walk penalty in cycles (modern kernels / page tables)

[perf_model/itlb]
size = 256
associativity = 4

[perf_model/dtlb]
size = 128
associativity = 4

[perf_model/stlb]
size = 1024
associativity = 8

[perf_model/l1_icache]
cache_size = 32
associativity = 8
data_access_time = 3
tags_access_time = 1

[perf_model/l1_dcache]
cache_size = 48
associativity = 8
data_access_time = 3
tags_access_time = 1

[perf_model/l2_cache]
cache_size = 2048
associativity = 8
data_access_time = 12
tags_access_time = 2
writeback_time = 30

[perf_model/l3_cache]
cache_size = 61440            # aproximadamente 64 MB L3 as example
associativity = 12
data_access_time = 20
tags_access_time = 8
shared_cores = 24             # example for a high-core SKU; ajuste para o número real de cores

[power]
vdd = 1.1                     # representative voltage for modern 10-14nm-class cores (approx)
technology_node = 10          # nm class (Intel process node naming varies; SPR is Intel 7 / advanced node)

[perf_model/dram_directory]
total_entries = 2097152

# DDR5-4800 (Intel Xeon Sapphire Rapids typical memory configuration)
[perf_model/dram]
# -1 means distributed DRAM controllers; Sapphire Rapids exposes 8 logical channels per socket
num_controllers = -1
controllers_interleaving = 8
# DRAM access latency in nanoseconds (modeling value).  DDR5 CAS cycles differ; use datasheet/measurements for higher accuracy.
latency = 25
# per-channel theoretical bandwidth: 4800 MT/s × 8 bytes = 38.4 GB/s
per_controller_bandwidth = 38.4
# chips per DIMM depends on DIMM type (RDIMM/LRDIMM) and rank organization
chips_per_dimm = 16
# Typical server config: up to 2 DIMMs per channel (2DPC supported); 1DPC often allows highest speed (4800)
dimms_per_controller = 2
burst_length = 16                # DDR5 uses BL16 (internal 2×32-bit subchannels; 16 transfers)

[network/bus]
# allow high interconnect bandwidth to avoid bottlenecking the 8-channel memory subsystem
bandwidth = 307.2            # GB/s aggregate (theoretical peak: 38.4 GB/s × 8 channels)
