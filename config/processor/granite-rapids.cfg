# Configuration file for Intel Xeon 6733P-B (Granite Rapids)
# Based on the Redwood Cove core architecture. Some values are estimates.

#include intel_arch

[general]
total_cores = 64

[perf_model/core]
logical_cpus = 1                    # Hyper-Threading disabled on P-Core
frequency = 2.2                     # Estimated base frequency

[perf_model/core/interval_timer]
dispatch_width = 8
window_size = 640                   # Estimated Re-order Buffer (ROB) size
num_outstanding_loadstores = 50     # Load/Store Buffers

[perf_model/branch_predictor]
mispredict_penalty = 14

[perf_model/tlb]
penalty = 40

[perf_model/itlb]
size = 256
associativity = 16

[perf_model/dtlb]
size = 128
associativity = 16

[perf_model/stlb]
size = 4096
associativity = 16

[perf_model/l1_icache]
cache_size = 64               # 64 KB
associativity = 16
data_access_time = 5
tags_access_time = 1

[perf_model/l1_dcache]
cache_size = 48               # 48 KB
associativity = 12
data_access_time = 4
tags_access_time = 1

[perf_model/l2_cache]
cache_size = 3072             # 3 MB per core
associativity = 12
data_access_time = 15
tags_access_time = 4
writeback_time = 80

[perf_model/l3_cache]
cache_size = 327680           # 320 MB
associativity = 20
data_access_time = 45
tags_access_time = 17
shared_cores = 64

[power]
technology_node = 3           # "Intel 3" process node (3nn)

[perf_model/dram_directory]
total_entries = 5242880       # Sized for the L3 cache

[perf_model/dram]
controllers_interleaving = 64
latency = 90                  # ~90ns for DDR5
per_controller_bandwidth = 614# Peak theoretical: DDR5-6400 x 12 channels = 614.4 GB/s
chips_per_dimm = 8
dimms_per_controller = 12
burst_length = 16

[network/bus]
bandwidth = 40                # Estimated UPI speed: 20 GT/s -> 40 GB/s per direction
