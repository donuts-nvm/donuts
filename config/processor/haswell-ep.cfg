# Configuration file for Intel Xeon E5-2630 v3 (Haswell-EP)
# Based on the Haswell microarchitecture.

#include intel_arch

[general]
total_cores = 8

[perf_model/core]
logical_cpus = 1                    # SMT (Hyper-Threading) disabled for predictable performance
frequency = 2.4

[perf_model/core/interval_timer]
dispatch_width = 8
window_size = 192                   # Re-order Buffer (ROB) size for Haswell
num_outstanding_loadstores = 24     # Load/Store Buffers

[perf_model/branch_predictor]
mispredict_penalty = 10

[perf_model/tlb]
penalty = 30

[perf_model/itlb]
size = 128
associativity = 8

[perf_model/dtlb]
size = 64
associativity = 4

[perf_model/stlb]
size = 1024
associativity = 8

[perf_model/l1_icache]
cache_size = 32               # 32 KB
associativity = 8
data_access_time = 4
tags_access_time = 1

[perf_model/l1_dcache]
cache_size = 32               # 32 KB
associativity = 8
data_access_time = 4
tags_access_time = 1

[perf_model/l2_cache]
cache_size = 256              # 256 KB per core
associativity = 8
data_access_time = 9
tags_access_time = 3
writeback_time = 55

[perf_model/l3_cache]
cache_size = 20480            # 20 MB
associativity = 20
data_access_time = 33
tags_access_time = 12
shared_cores = 8

[power]
technology_node = 22          # 22 nm

[perf_model/dram_directory]
total_entries = 327680        # Sized for the L3 cache

[perf_model/dram]
controllers_interleaving = 64
latency = 70                  # ~70ns for DDR4
per_controller_bandwidth = 60 # Peak theoretical: DDR4-1866 x 4 channels = ~59.7 GB/s
chips_per_dimm = 8
dimms_per_controller = 4
burst_length = 8

[network/bus]
bandwidth = 16                # QPI: 8.0 GT/s -> 16 GB/s per direction
