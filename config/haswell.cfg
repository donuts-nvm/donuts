# Configuration file for Intel Xeon E5-2630 v3 (Haswell-EP)
# Based on your Xeon X5550 (Gainestown) config, adapted to Haswell-EP (E5 v3)

#include baseline

[perf_model/core]
logical_cpus = 1           # number of SMT threads per core (keep 1 for single-threaded cores)
core_model = nehalem       # haswell
frequency = 2.4            # typical base frequency (GHz) - ajuste para o SKU exato

[perf_model/l1_icache]
cache_size = 32
associativity = 8
data_access_time = 4
tags_access_time = 1

[perf_model/l1_dcache]
cache_size = 32
associativity = 8
data_access_time = 4
tags_access_time = 1

[perf_model/l2_cache]
cache_size = 256
associativity = 8
data_access_time = 6       # Haswell L2 is a bit faster than Nehalem; ajuste se tiver microbenchmarks
tags_access_time = 2
writeback_time = 40        # L3 hit time will be added

[perf_model/l3_cache]
cache_size = 20480         # 20 MB L3
associativity = 20         # typical Intel slices use high assoc (use 20 as representação)
data_access_time = 20      # cycles for L3 (Haswell core+cache closer than Nehalem)
tags_access_time = 8
shared_cores = 8           # typical for an 8-core CPU; ajuste para número de cores do SKU

[power]
vdd = 1.0                  # volts (Haswell operates em tensões menores; valor representativo)
technology_node = 22       # nm (Haswell-EP ~22nm)

# DDR4-2133 (Haswell-EP typical memory configuration)
[perf_model/dram]
# DRAM access latency in nanoseconds (modeling value). Datasheet CL->ns conversions or measurements recommended.
latency = 35
# per channel theoretical bandwidth: 2133 MT/s × 8 bytes ≈ 17.06 GB/s
# you can set the measured bandwidth instead (lower) if you want to match real hardware benchmarks
per_controller_bandwidth = 17.06
chips_per_dimm = 8
# typical server configs use 1-2 DIMMs per channel; many platforms allow up to 2 DPC reliably
dimms_per_controller = 2

[network/bus]
# increase interconnect bandwidth to match Haswell-class platforms (example: allow larger aggregate bw)
bandwidth = 68.3         # GB/s (approx equal to one-socket peak memory BW ~68.3 GB/s); ajuste conforme necessidade
