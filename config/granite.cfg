# Configuration file for Intel Xeon Granite Rapids (Xeon 6 - representative SP SKU) | Xeon 6533P-B
# Based on your Xeon X5550 (Gainestown) config and adapted to Granite Rapids characteristics.
# Notes: this is a template for a typical Granite Rapids-SP socket (8 DDR5 channels).
# Adjust frequency, core counts, L3 size and memory channels for the exact SKU you simulate.

#include baseline

[perf_model/core]
logical_cpus = 1                       # SMT threads per core (set 2 if modelling SMT)
core_model = nehalem                   # redwood_cove
frequency = 2.2                        # base frequency (GHz) - ajuste conforme SKU

[perf_model/core/interval_timer]
dispatch_width = 6                     # modern wide cores can issue more microops
window_size = 200
num_outstanding_loadstores = 32        # higher OOO resources on modern cores

[perf_model/branch_predictor]
type = pentium_m                       # tournament_m
mispredict_penalty = 12

[perf_model/tlb]
penalty = 40

[perf_model/itlb]
size = 256
associativity = 4

[perf_model/dtlb]
size = 128
associativity = 4

[perf_model/stlb]
size = 2048
associativity = 8

[perf_model/l1_icache]
cache_size = 64
associativity = 16
data_access_time = 3
tags_access_time = 1

[perf_model/l1_dcache]
cache_size = 48
associativity = 8
data_access_time = 3
tags_access_time = 1

[perf_model/l2_cache]
cache_size = 2048
associativity = 16
data_access_time = 10
tags_access_time = 2
writeback_time = 30

[perf_model/l3_cache]
cache_size = 131072                     # 128 MB
associativity = 16
data_access_time = 22
tags_access_time = 8
shared_cores = 64                       # example for a high-core SKU; ajuste conforme SKU

[power]
vdd = 1.05                              # representative modern core Vdd (ajuste conforme dataset)
technology_node = 3                     # Intel node class; ajuste conforme necessidade

[perf_model/dram_directory]
total_entries = 2097152

# DDR5-6400 (representative per-channel for Granite Rapids-SP: 8 channels)
[perf_model/dram]
# -1 models distributed DRAM controllers; Granite Rapids-SP typical SKU exposes 8 channels
num_controllers = -1
controllers_interleaving = 8
# DRAM access latency in ns (modeling). Convert DIMM CL cycles -> ns for accuracy; 20-30ns is a reasonable modelling range.
latency = 22
# per-channel theoretical bandwidth: 6400 MT/s × 8 bytes = 51.2 GB/s
per_controller_bandwidth = 51.2
# chips_per_dimm depends on DIMM type and rank (RDIMM/LRDIMM/x4/x8). 16 is a reasonable server-RDIMM estimate.
chips_per_dimm = 16
# Typical server configs: 1DPC best-case speed; 2DPC reduces supported frequency. Use 1..2 per controller in servers.
dimms_per_controller = 2
burst_size = 16                          # DDR5 uses BL16 (internal two 32-bit subchannels)

[network/bus]
bandwidth = 409.6                        # GB/s aggregate (51.2 × 8 channels); set high to avoid bottleneck
