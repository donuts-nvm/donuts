#include gainestown-nvm

[general]
project_type = donuts

[perf_model/cache]
levels = 3

[perf_model/l1_icache]
cache_size = 32
associativity = 4
replacement_policy = lru

[perf_model/l1_dcache]
cache_size = 4
associativity = 4
writethrough = 0
shared_cores = 1

[perf_model/l2_cache]
cache_size = 16
associativity = 4
writethrough = 0
shared_cores = 1

[perf_model/l3_cache]
cache_block_size = 64
cache_size = 64
associativity = 8
cache_set_threshold = 0.75
cache_threshold = 0.9
replacement_policy = lru
writethrough = 0
shared_cores = 4
