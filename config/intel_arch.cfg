# General configs for any Intel x64 architecture-based system

[general]
enable_icache_modeling = true

[perf_model/core]
type = interval
core_model = nehalem    # Closest architecture in Sniper for Intel processors

[perf_model/sync]
reschedule_cost = 1000

[caching_protocol]
type = parametric_dram_directory_msi

[perf_model/branch_predictor]
type = pentium_m        # Recent processors use a tournament_m branch predictor, but it's not yet implemented in Sniper

[perf_model/cache]
levels = 3

[perf_model/l1_icache]
perfect = false
cache_block_size = 64
address_hash = mask
replacement_policy = lru
perf_model_type = parallel
writethrough = 0
shared_cores = 1

[perf_model/l1_dcache]
perfect = false
cache_block_size = 64
address_hash = mask
replacement_policy = lru
perf_model_type = parallel
writethrough = 0
shared_cores = 1

[perf_model/l2_cache]
perfect = false
cache_block_size = 64
address_hash = mask
replacement_policy = lru
perf_model_type = parallel
writethrough = 0
shared_cores = 1

[perf_model/l3_cache]
perfect = false
cache_block_size = 64
address_hash = mask
dvfs_domain = global    # L1 and L2 run at core frequency (default), L3 is system frequency
prefetcher = none
writeback_time = 0
replacement_policy = lru
perf_model_type = parallel
writethrough = 0

[clock_skew_minimization]
scheme = barrier

[clock_skew_minimization/barrier]
quantum = 100

[dvfs]
transition_latency = 2000 # In ns, "under 2 microseconds" according to http://download.intel.com/design/intarch/papers/323671.pdf (page 8)

[dvfs/simple]
cores_per_socket = 1

[power]
vdd = 1.2 # Volts

[perf_model/dram_directory]
associativity = 16
directory_type = full_map

[perf_model/dram]
num_controllers = -1    # -1 means that we have a number of distributed DRAM controllers (4 in this case)

[network]
memory_model_1 = bus
memory_model_2 = bus

[network/bus]
ignore_local_traffic = true # Memory controllers are on-chip, so traffic from core0 to dram0 does not use the QPI links
