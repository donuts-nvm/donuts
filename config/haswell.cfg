# Configuration file for Intel Xeon E5-2600 v3 (Haswell-EP)
# Based on your Xeon X5550 (Gainestown) config, adapted to Haswell-EP (E5 v3)

[general]
enable_icache_modeling = true

[perf_model/core]
logical_cpus = 1                       # number of SMT threads per core (keep 1 for single-threaded cores)
type = interval
core_model = haswell                   # haswell core model
frequency = 2.40                       # typical base frequency (GHz) - ajuste para o SKU exato

[perf_model/core/interval_timer]
dispatch_width = 4
window_size = 128
num_outstanding_loadstores = 10

[perf_model/sync]
reschedule_cost = 1000

[caching_protocol]
type = parametric_dram_directory_msi

[perf_model/branch_predictor]
type = pentium_m
mispredict_penalty = 8

[perf_model/tlb]
penalty = 30          # Page walk penalty in cycles (mantive, ajuste se necessário)

[perf_model/itlb]
size = 128
associativity = 4

[perf_model/dtlb]
size = 64
associativity = 4

[perf_model/stlb]
size = 512
associativity = 4

[perf_model/cache]
levels = 3

[perf_model/l1_icache]
perfect = false
cache_size = 32
associativity = 4
address_hash = mask
replacement_policy = lru
data_access_time = 4
tags_access_time = 1
perf_model_type = parallel
writethrough = 0
shared_cores = 1

[perf_model/l1_dcache]
perfect = false
cache_size = 32
associativity = 8
address_hash = mask
replacement_policy = lru
data_access_time = 4
tags_access_time = 1
perf_model_type = parallel
writethrough = 0
shared_cores = 1

[perf_model/l2_cache]
perfect = false
cache_size = 256
associativity = 8
address_hash = mask
replacement_policy = lru
data_access_time = 6        # Haswell L2 is a bit faster than Nehalem; ajuste se tiver microbenchmarks
tags_access_time = 2
writeback_time = 40        # L3 hit time will be added
perf_model_type = parallel
writethrough = 0
shared_cores = 1

[perf_model/l3_cache]
cache_block_size = 64
address_hash = mask
dvfs_domain = global
prefetcher = none
writeback_time = 0
perfect = false
cache_size = 20480         # 20 MB L3 (exemplo representativo; ajuste conforme SKU: 10..45 MB possível)
associativity = 20         # typical Intel slices use high assoc (use 20 as representação)
replacement_policy = lru
data_access_time = 20      # cycles for L3 (Haswell core+cache closer than Nehalem)
tags_access_time = 8
perf_model_type = parallel
writethrough = 0
shared_cores = 8           # typical for an 8-core CPU; ajuste para número de cores do SKU

[clock_skew_minimization]
scheme = barrier

[clock_skew_minimization/barrier]
quantum = 100

[dvfs]
transition_latency = 2000  # In ns (mantive; ajuste se quiser outra estimativa)

[dvfs/simple]
cores_per_socket = 1

[power]
vdd = 1.0                  # volts (Haswell operates em tensões menores; valor representativo)
technology_node = 22       # nm (Haswell-EP ~22nm)

[perf_model/dram_directory]
total_entries = 1048576
associativity = 16
directory_type = full_map

# DDR4-2133 (Haswell-EP typical memory configuration)
[perf_model/dram]
# -1 means Sniper models distributed DRAM controllers; we use 4 to represent 4 channels per socket
num_controllers = -1
controllers_interleaving = 4
# DRAM access latency in nanoseconds (modeling value). Datasheet CL->ns conversions or measurements recommended.
latency = 35
# per channel theoretical bandwidth: 2133 MT/s × 8 bytes ≈ 17.06 GB/s
# you can set the measured bandwidth instead (lower) if you want to match real hardware benchmarks
per_controller_bandwidth = 17.06
chips_per_dimm = 8
# typical server configs use 1-2 DIMMs per channel; many platforms allow up to 2 DPC reliably
dimms_per_controller = 2
burst_size = 8

[network]
memory_model_1 = bus
memory_model_2 = bus

[network/bus]
# increase interconnect bandwidth to match Haswell-class platforms (example: allow larger aggregate bw)
bandwidth = 68.3         # GB/s (approx equal to one-socket peak memory BW ~68.3 GB/s); ajuste conforme necessidade
ignore_local_traffic = true
